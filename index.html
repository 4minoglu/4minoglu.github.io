<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4MİNOGLU Oyun İndirme</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* Üst */
header {
    background: #1e293b;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

/* Başlık */
.hero {
    text-align: center;
    margin-top: 40px;
}

.hero h1 {
    color: #38bdf8;
    font-size: 32px;
}

/* Arama */
.search-box {
    display: flex;
    justify-content: center;
    margin: 20px;
}

.search-box input {
    width: 300px;
    padding: 10px;
    border: none;
    border-radius: 8px;
}

.search-box button {
    padding: 10px 15px;
    margin-left: 10px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    cursor: pointer;
}

/* Sonuçlar */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: #334155;
}
</style>
</head>

<body>

<header>
    🎮 4MİNOGLU Oyun İndirme Sitesi
</header>

<div class="hero">
    <h1>Oyun veya Yapımcı Ara</h1>
</div>

<div class="search-box">
    <input id="search" type="text" placeholder="Örn: innersloth, minecraft, riot...">
    <button onclick="searchGame()">Ara</button>
</div>

<div id="results" class="container"></div>

<script>
const games = [
    { name: "Among Us", dev: "InnerSloth" },
    { name: "Henry Stickmin Collection", dev: "InnerSloth" },
    { name: "Minecraft", dev: "Mojang" },
    { name: "GTA V", dev: "Rockstar Games" },
    { name: "Valorant", dev: "Riot Games" },
    { name: "CS:GO", dev: "Valve" }
];

function searchGame() {
    let input = document.getElementById("search").value.toLowerCase();
    let results = document.getElementById("results");

    results.innerHTML = "";

    let filtered = games.filter(g =>
        g.name.toLowerCase().includes(input) ||
        g.dev.toLowerCase().includes(input)
    );

    if (filtered.length === 0) {
        results.innerHTML = "<p style='text-align:center'>Sonuç bulunamadı</p>";
        return;
    }

    filtered.forEach(g => {
        results.innerHTML += `
            <div class="card">
                <h3>${g.name}</h3>
                <p>Yapımcı: ${g.dev}</p>
            </div>
        `;
    });
}
</script>

</body>
</html>
