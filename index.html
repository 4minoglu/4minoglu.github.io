<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4MİNOGLU Oyun İndirme Sitesi</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    background: #1e293b;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.hero {
    text-align: center;
    margin-top: 30px;
}

.hero h1 {
    color: #38bdf8;
}

.search-box {
    display: flex;
    justify-content: center;
    margin: 20px;
}

.search-box input {
    width: 300px;
    padding: 10px;
    border: none;
    border-radius: 8px;
}

.search-box button {
    margin-left: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    cursor: pointer;
}

/* Kartlar */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: #334155;
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 8px;
}

.download-btn {
    margin-top: 10px;
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background: #22c55e;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
🎮 4MİNOGLU Oyun İndirme Sitesi
</header>

<div class="hero">
    <h1>Oyun veya Yapımcı Ara</h1>
</div>

<div class="search-box">
    <input id="search" type="text" placeholder="innersloth, minecraft, gta...">
    <button onclick="searchGame()">Ara</button>
</div>

<div id="results" class="container"></div>

<script>
const games = [
    {
        name: "Among Us",
        dev: "InnerSloth",
        img: "https://upload.wikimedia.org/wikipedia/en/9/9a/Among_Us_cover_art.jpg"
    },
    {
        name: "Henry Stickmin Collection",
        dev: "InnerSloth",
        img: "https://upload.wikimedia.org/wikipedia/en/3/3b/The_Henry_Stickmin_Collection.jpg"
    },
    {
        name: "Minecraft",
        dev: "Mojang",
        img: "https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png"
    },
    {
        name: "GTA V",
        dev: "Rockstar Games",
        img: "https://upload.wikimedia.org/wikipedia/en/a/a5/Grand_Theft_Auto_V.png"
    },
    {
        name: "Valorant",
        dev: "Riot Games",
        img: "https://upload.wikimedia.org/wikipedia/en/3/30/Valorant_cover.jpg"
    }
];

function searchGame() {
    let input = document.getElementById("search").value.toLowerCase();
    let results = document.getElementById("results");

    results.innerHTML = "";

    let filtered = games.filter(g =>
        g.name.toLowerCase().includes(input) ||
        g.dev.toLowerCase().includes(input)
    );

    if (filtered.length === 0) {
        results.innerHTML = "<p style='text-align:center'>Sonuç bulunamadı</p>";
        return;
    }

    filtered.forEach(g => {
        results.innerHTML += `
            <div class="card">
                <img src="${g.img}" alt="${g.name}">
                <h3>${g.name}</h3>
                <p>${g.dev}</p>
                <button class="download-btn" onclick="downloadGame('${g.name}')">
                    İndir
                </button>
            </div>
        `;
    });
}

function downloadGame(gameName) {

    if (gameName === "Among Us") {
        alert("Dosya mevcut değil ❌");
        return;
    }

    if (gameName === "Henry Stickmin Collection") {
        window.location.href = "downloadGame.html";
        return;
    }

    alert("Bu oyun için indirme yok ⚠️");
}
</script>

</body>
</html>
